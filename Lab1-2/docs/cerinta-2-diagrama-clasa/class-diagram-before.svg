<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" font-family="Consolas, monospace">
  <rect width="720" height="480" fill="#0d1117"/>
  <text x="360" y="28" fill="#f85149" font-size="14" text-anchor="middle" font-family="Segoe UI">Diagrama de clasa - STARE ACTUALA (God Class)</text>

  <rect x="40" y="60" width="180" height="90" fill="#161b22" stroke="#30363d" rx="4"/>
  <text x="130" y="82" fill="#e6edf3" font-size="13" text-anchor="middle" font-weight="bold">OrderController</text>
  <line x1="40" y1="92" x2="220" y2="92" stroke="#30363d"/>
  <text x="50" y="112" fill="#8b949e" font-size="11">- _manager : OrderManager</text>
  <text x="50" y="130" fill="#d2a8ff" font-size="11">+ PostOrder(), DeleteOrder()</text>

  <rect x="280" y="50" width="260" height="200" fill="#2d0f0f" stroke="#f85149" stroke-width="2" rx="4"/>
  <text x="410" y="72" fill="#f85149" font-size="13" text-anchor="middle" font-weight="bold">OrderManager «God Class»</text>
  <line x1="280" y1="82" x2="540" y2="82" stroke="#5a1e1e"/>
  <text x="290" y="100" fill="#8b949e" font-size="10">- _sqlConnectionString, _smtpHost</text>
  <text x="290" y="115" fill="#8b949e" font-size="10">- _paymentApiUrl, _orders, _stock</text>
  <text x="290" y="135" fill="#d2a8ff" font-size="10">+ PlaceOrder(), CancelOrder()</text>
  <text x="290" y="150" fill="#d2a8ff" font-size="10">+ UpdateOrderStatus(), GenerateSalesReport()</text>
  <text x="290" y="170" fill="#6e7681" font-size="10">- ProcessPaymentInternal()</text>
  <text x="290" y="185" fill="#6e7681" font-size="10">- SaveOrderToDatabase(), Send*Email()</text>
  <text x="290" y="215" fill="#f85149" font-size="10">PROBLEME: cuplare mare, coeziune mica</text>

  <rect x="40" y="280" width="200" height="120" fill="#161b22" stroke="#30363d" rx="4"/>
  <text x="140" y="302" fill="#e6edf3" font-size="13" text-anchor="middle" font-weight="bold">Order</text>
  <line x1="40" y1="312" x2="240" y2="312" stroke="#30363d"/>
  <text x="50" y="332" fill="#8b949e" font-size="11">+ Id, CustomerEmail, Items</text>
  <text x="50" y="350" fill="#8b949e" font-size="11">+ Status, TotalAmount</text>

  <rect x="300" y="300" width="150" height="70" fill="#161b22" stroke="#30363d" rx="4"/>
  <text x="375" y="322" fill="#e6edf3" font-size="12" text-anchor="middle" font-weight="bold">OrderItem</text>
  <text x="310" y="345" fill="#8b949e" font-size="10">+ ProductSku, Quantity, UnitPrice</text>

  <line x1="220" y1="105" x2="280" y2="120" stroke="#6e7681" marker-end="url(#a)"/>
  <line x1="410" y1="250" x2="140" y2="280" stroke="#3fb950" marker-start="url(#diamond)"/>
  <line x1="240" y1="340" x2="300" y2="335" stroke="#6e7681"/>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="#6e7681"/></marker>
    <marker id="diamond" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto"><polygon points="0,5 5,0 10,5 5,10" fill="#3fb950"/></marker>
  </defs>
</svg>
